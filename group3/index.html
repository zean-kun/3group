<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News || current event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                News APS
            </h1>
            <p>
                Stay informed with latest news from around the world
            </p>
        </div>
        <div class="search-categories">
            <input type="text" class="search-box" placeholder="search...." id="searchBox">
            <div class="categories">
                <button class="category-btn active" data-category="general">
                    General
                </button>
                <button class="category-btn " data-category="business">
                    Business
                </button>
                <button class="category-btn " data-category="entertainment">
                    Entertainment
                </button>
                <button class="category-btn " data-category="health">
                    Health
                </button>
                <button class="category-btn " data-category="general">
                    General
                </button>
                <button class="category-btn " data-category="science">
                    Science
                </button>
                <button class="category-btn " data-category="sports">
                    Sports
                </button>
                <button class="category-btn " data-category="technology">
                    Technology
                </button>
            </div>
        </div>
        <div class="news-grid" id="newsGrid">

        </div>
        <div class="loading" id="loading" style="display: none;">
            Loading...
        </div>
        <div class="error" id="error" style="display: none;">

        </div>
        <div class="end-message" id="endMessage" style="display: none;">
            🎉you've reached the end!
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
